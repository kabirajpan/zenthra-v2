<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Simple Box</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }

    .box {

      width: 60px;
      height: 400px;
      background: #ffffff;
      border: 2px solid #333;

      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 4px 4px 10px rgba(0, 0, 0, 0.15);
    }

    .box p {
      font-family: Arial, sans-serif;
      font-size: 18px;
      color: #333;
      margin: 0;
    }
  </style>
</head>

<body>
  <div class="box">
    <p>Hello, Worljd!</p>
  </div>
</body>

</html>
