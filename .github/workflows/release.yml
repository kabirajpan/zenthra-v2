name: Zenthra Framework CI Check (Legacy)

# This workflow is kept for branch-check compatibility.
# For full multi-OS CI, see ci.yml.
# For app-specific release builds, see apps/file_manager and apps/image_viewer workflows.

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  check:
    name: Quick Cargo Check (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install System Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libx11-dev \
            libx11-xcb-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libegl1-mesa-dev \
            libgbm-dev

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run check
        run: cargo check

      - name: Run tests
        run: cargo test --workspace --exclude window_test_mobile
